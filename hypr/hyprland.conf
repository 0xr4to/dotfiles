#https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br                                                                              #Set keyboard layout to brazilian abnt2.
    follow_mouse = 1                                                                            #Window is active when mouse is on it.
    numlock_by_default = true                                                                   #Engage numlock by default.
    repeat_rate = 50                                                                            #The repeat rate for held-down keys, in repeats per second.
    repeat_delay = 200                                                                          #Delay before a held-down key is repeated, in milliseconds.
    sensitivity = -0.6                                                                          #Mouse sensitivity.
    force_no_accel = false                                                                      #Mouse acceleration.
}

