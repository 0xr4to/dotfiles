#               ‚ĖĎ ‚ĖĎ           ‚ĖĎ                 ‚ĖĎ

#################
### variables ###
#################

$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun
$chrome = chromium
$spotify = spotify
$discord = discord
$zat = zathura
$pass = keepassxc
$browser = zen
$obs = obsidian --enable-features=UseOzonePlatform --ozone-platform=wayland
$osu = osu

$reload = ~/.config/hypr/scripts/reload.sh
$active = ~/.config/hypr/scripts/active.sh

###################
### keybindings ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, H, exec, $active
# Window/Session actions
bind = $mainMod, Q, killactive,
bind = $mainMod, Delete, exit,
bind = $mainMod, W, togglefloating,
#bind = $mainMod, J, togglesplit, # dwindle
#bind = $mainMod, L, exec, swaylock
bind = Alt, Return, fullscreen, # togle between focus and fullscreen

bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, exec, $terminal
bind = $mainMod, C, exec, $chrome
bind = $mainMod SHIFT, C, exec, $chrome --incognito
bind = $mainMod, S, exec, $spotify
bind = $mainMod, D, exec, $discord
bind = $mainMod, A, exec, $menu
bind = $mainMod, Z, exec, $zat
bind = $mainMod SHIFT, K, exec, $pass
bind = $mainMod, B, exec, $browser -password-store=basic
bind = $mainMod SHIFT, B, exec, $browser --password-store=basic --incognito
bind = $mainMod, O, exec, $obs
bind = $mainMod SHIFT, O, exec, $osu
bind = $mainMod, R, exec, $reload

# Screenshot/Screencapture
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f - # partial screenshot capture
bind = $mainMod, P, exec, bash -c "grim - | swappy -f -" # Full screenshot capture
#bind = $mainMod SHIFT, P, exec, bash -c 'grim -o "$(hyprctl monitors -j | jq -r ".[] | select(.focused) | .name")" - | swappy -f -' # Focused monitor screenshot

#bind = $mainMod+Ctrl, P, exec, grimblast --freeze copysave area | swappy -f - # partial screenshot capture (frozen screen)
#bind = $mainMod+Alt, P, exec, grimblast copysave output # monitor screenshot capture
#bind = , Print, exec, grimblas copysave screen # all monitors screenshot capture

# Move focus with mainMod + arrow keys
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

