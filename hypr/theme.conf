general {
    border_size = 1
    gaps_in = 3
    gaps_out = 9
    col.active_border = rgba(120,0,0,1) 45deg
    col.inactive_border = rgba(230,225,220,0.6) 45deg
    layout = dwindle
    resize_on_border = true
}


decoration {
    rounding = 3
    
    blur {
        enabled = yes
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    shadow {
        enabled = false
    }
}
